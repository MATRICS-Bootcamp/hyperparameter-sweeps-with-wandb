program: wandb_train.py

method: bayes          # Options: bayes, random, grid
metric:
  name: val_accuracy
  goal: maximize

parameters:
  n_estimators:
    values: [50, 100, 200]
  max_depth:
    values: [3, 10, 20]
  min_samples_split:
    values: [2, 6, 10]

run_cap: 10            # Stop after 40 total runs across all agents